<!DOCTYPE html>
<html>
<head>
<title>Flappy Bae 💖</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: 'Comic Sans MS', 'Chalkboard SE', cursive, sans-serif;
    overflow: hidden;
    user-select: none;
    touch-action: none;
  }
  #game {
    position: relative;
    border: 4px dashed #ff4d9e;
    box-shadow: 0 0 40px #ff4d9e66;
    max-width: 100vw;
    max-height: 100vh;
  }
  canvas { display: block; background: #0f0f23; }
  #score {
    position: absolute;
    top: 10px;
    width: 100%;
    font-size: 24px;
    color: #ffb6c1;
    text-shadow: 2px 2px 0 #000;
    z-index: 10;
  }
  #message {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 30px;
    color: #fff;
    text-shadow: 3px 3px 0 #ff4d9e;
    z-index: 10;
    pointer-events: none;
  }
  #startScreen {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: #0f0f23f0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 20;
    cursor: pointer;
  }
  #startScreen h1 {
    font-size: 46px;
    color: #ff4d9e;
    text-shadow: 4px 4px 0 #000;
    margin-bottom: 8px;
  }
  #startScreen p {
    font-size: 19px;
    color: #ffb6c1;
    animation: blink 0.6s infinite alternate;
  }
  @keyframes blink { from { opacity: 1; } to { opacity: 0.3; } }
</style>
</head>
<body>

<div id="game">
  <canvas id="c"></canvas>
  <div id="score"></div>
  <div id="message"></div>
  <div id="startScreen">
    <h1>💖 Flappy Me</h1>
    <p>~ tap / click / press ⬆️ to ignore my cutiepie ~</p>
    <p style="font-size:14px; color:#aaa; margin-top:10px;">
      dodge my bunny, my dork & my snuggle bug.<br>
      stay cute. don't crash into me... yet 😏
    </p>
  </div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');
const msgEl = document.getElementById('message');
const startScreen = document.getElementById('startScreen');

const W = 360;
const H = 660;
canvas.width = W;
canvas.height = H;

// --- CHILL PHYSICS ---
/*
const GRAVITY = 0.22;
const JUMP_FORCE = -4.8;
const MAX_FALL_SPEED = 7;
const PIPE_SPEED = 2.0;
const PIPE_GAP = 165;
const PIPE_W = 65;
const SPAWN_RATE = 115;*/

 
const GRAVITY = 0.32;
const JUMP_FORCE = -6.2;
const MAX_FALL_SPEED = 9;
const PIPE_SPEED = 2.2;
const PIPE_GAP = 165;
const PIPE_W = 65;
const SPAWN_RATE = 115;

// Cute & funny pet names for obstacles
const funnyLabels = [
  "My Cutiepie 🥧", "My Bunny 🐰", "My Dork 🤓", "My Snuggle Bug 🐞",
  "My Chaos Kitty 🌪️", "My Little Dumpling 🥟", "My Sleepy Bae 💤",
  "My Walking Blanket 🧸", "My Overthinker 🧠", "My Clingy Koala 🐨"
];

const funnyTexts = [
  "Dodging my cutiepie like... 🥺✨", "Bunny? More like BUN-CH of trouble 🐰💅",
  "He's literally a snack 🍰", "Slaying while ignoring the dork 🤭",
  "Too cute to crash into 💖", "Still pretending like innocent 🙄💕"
];

const deathTexts = [
  "Crashed into my cutiepie 💥🥺", "Bunny caught me 🐰💔", 
  "Fell for the dork... literally 😵‍💫", "Oops. Cuddle time now? 🫂", 
  "You win. I'll allow it 🤷‍♀️💕", "Tried to dodge, got distracted by cute 🐻"
];

// --- AUDIO ---
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx;

const clickAudio = new Audio('click.mp3');
clickAudio.preload = 'auto';

// 🎵 CUSTOM CRASH SOUND: Change this to your MP3 filename!
const crashSounds = [
  'fahhh.mp3',
  'e2.mp3',
  'e3.mp3',
  'e4.mp3',
  'e5.mp3',
  'e6.mp3',
  'e7.mp3',
  'e7 - copy.mp3' // 👈 renamed
];

let currentCrashAudio = null;
// preload all sounds
const crashAudios = crashSounds.map(src => {
  const a = new Audio(src);
  a.preload = 'auto';
  return a;
});
function initAudio() { 
  if (!audioCtx) {
    audioCtx = new AudioCtx();
    audioCtx.resume(); 
  }
  // Unlock mobile audio on first interaction
  crashAudios.forEach(a => a.load());
}

function playClick() {
  clickAudio.currentTime = 0;
  clickAudio.volume = 1.0;
  clickAudio.playbackRate = 0.9 + Math.random() * 0.2;
  clickAudio.play().catch(() => {});
}

function playJump() {
  if (!audioCtx) return;
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.connect(g); g.connect(audioCtx.destination);
  o.type = 'triangle';
  o.frequency.setValueAtTime(350, audioCtx.currentTime);
  o.frequency.linearRampToValueAtTime(550, audioCtx.currentTime + 0.05);
  o.frequency.linearRampToValueAtTime(300, audioCtx.currentTime + 0.08);
  g.gain.setValueAtTime(0.12, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
  o.start(); o.stop(audioCtx.currentTime + 0.1);
}

function playScore() {
  if (!audioCtx) return;
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.connect(g); g.connect(audioCtx.destination);
  o.type = 'sine';
  o.frequency.setValueAtTime(600, audioCtx.currentTime);
  o.frequency.setValueAtTime(900, audioCtx.currentTime + 0.05);
  g.gain.setValueAtTime(0.1, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.12);
  o.start(); o.stop(audioCtx.currentTime + 0.12);
}

function playCrash() {
  const audio = crashAudios[
    Math.floor(Math.random() * crashAudios.length)
  ];

  // stop previous if somehow still playing
  if (currentCrashAudio) {
    currentCrashAudio.pause();
    currentCrashAudio.currentTime = 0;
  }

  currentCrashAudio = audio;

  audio.currentTime = 0;
  audio.volume = 1.0;
  audio.playbackRate = 0.95 + Math.random() * 0.1;

  audio.play().catch(() => {});
}

// --- PRELOAD IMAGES ---
const imageNames = ['friend.jpg','friend2.jpg','friend3.jpg','friend4.jpg','friend5.jpg','friend6.jpg'];
const preloadedImages = [];
imageNames.forEach(name => {
  const img = new Image();
  img.src = name;
  preloadedImages.push(img);
});

// --- GAME STATE ---
let bird, pipes, score, alive, started, frameCount, startTime;
let hearts = [];
let gameOverBg = null;

function initBird() {
  bird = {
    x: 80 ,y: H / 2, vy: -0.5,
    size: 60,
    img: null, imgReady: false, rotation: 0
  };
  const randomImg = preloadedImages[Math.floor(Math.random() * preloadedImages.length)];
  if (randomImg.complete) {
    bird.img = randomImg;
    bird.imgReady = true;
  } else {
    randomImg.onload = () => { bird.img = randomImg; bird.imgReady = true; };
    randomImg.onerror = () => { bird.imgReady = false; };
  }
}

function reset() {

  if (currentCrashAudio) {
  currentCrashAudio.pause();
  currentCrashAudio.currentTime = 0;
}
  initBird();
  pipes = [];
  hearts = [];
  score = 0;
  alive = true;
  frameCount = 0;
  startTime = Date.now();
  gameOverBg = null;
  scoreEl.textContent = 'Score: 0 (still ignoring me 🙄)';
  msgEl.textContent = '';
  if (!started) {
    started = true;
    startScreen.style.display = 'none';
    initAudio();
  }
}

function jump() {
  if (!alive || !started) return;
  bird.vy = JUMP_FORCE;
  bird.rotation = -15;
  playJump();
  playClick();
}

function handleInput(e) {
  if (e) e.preventDefault();
  if (!started) {
    started = true;
    startScreen.style.display = 'none';
    initAudio();
    return;
  }
  if (!alive) {
     if (currentCrashAudio) {
    currentCrashAudio.pause();
    currentCrashAudio.currentTime = 0;
  }
    reset();
    return;
  }
  jump();
}

document.addEventListener('keydown', (e) => {
  if (e.code === 'Space' || e.code === 'ArrowUp' || e.code === 'ArrowDown') handleInput(e);
});
canvas.addEventListener('mousedown', handleInput);
canvas.addEventListener('touchstart', handleInput, { passive: false });
startScreen.addEventListener('click', handleInput);
startScreen.addEventListener('touchstart', handleInput, { passive: false });

function spawnPipe() {
  const minY = 70;
  const maxY = H - PIPE_GAP - 70;
  const gapY = minY + Math.random() * (maxY - minY);
  const label = funnyLabels[Math.floor(Math.random() * funnyLabels.length)];
  pipes.push({ x: W-50, gapY: gapY, scored: false, label: label });
}

function spawnHeart() {
  hearts.push({
    x: Math.random() * W,
    y: H + 10,
    speed: 0.6 + Math.random() * 0.5,
    text: ['💕','💋','✨','💅','👀','🌸'][Math.floor(Math.random()*6)],
    alpha: 0.25 + Math.random() * 0.35
  });
}

function drawPipe(p) {
  const topH = p.gapY;
  const botY = p.gapY + PIPE_GAP;

  ctx.fillStyle = '#ff7eb3';
  ctx.fillRect(p.x, 0, PIPE_W, topH);
  ctx.fillRect(p.x, botY, PIPE_W, H - botY);

  ctx.fillStyle = '#ffb6c1';
  ctx.fillRect(p.x - 4, topH - 14, PIPE_W + 8, 14);
  ctx.fillRect(p.x - 4, botY, PIPE_W + 8, 14);

  ctx.fillStyle = '#ffffff';
  ctx.font = 'bold 13px Comic Sans MS, cursive';
  ctx.textAlign = 'center';
  ctx.shadowColor = 'rgba(0,0,0,0.8)';
  ctx.shadowBlur = 4;
  
  ctx.fillText(p.label, p.x + PIPE_W / 2, Math.max(20, topH / 2));
  ctx.fillText(p.label, p.x + PIPE_W / 2, botY + Math.max(20, (H - botY) / 2));
  
  ctx.shadowBlur = 0;

  ctx.strokeStyle = '#d63a7d';
  ctx.lineWidth = 2;
  ctx.strokeRect(p.x, 0, PIPE_W, topH);
  ctx.strokeRect(p.x, botY, PIPE_W, H - botY);
  ctx.strokeRect(p.x - 4, topH - 14, PIPE_W + 8, 14);
  ctx.strokeRect(p.x - 4, botY, PIPE_W + 8, 14);
}

function drawBird() {
  ctx.save();
  ctx.translate(bird.x + bird.size / 2, bird.y + bird.size / 2);
  
  let scale = 1 + Math.sin(frameCount * 0.1) * 0.05;
ctx.scale(scale, scale);  

  let targetRot = (bird.vy < 0) ? -15 : Math.min(bird.vy * 2.5, 60);
  bird.rotation += (targetRot - bird.rotation) * 0.1;
  ctx.rotate(bird.rotation * Math.PI / 180);

  if (bird.imgReady && bird.img) {
    ctx.drawImage(bird.img, -bird.size / 2, -bird.size / 2, bird.size, bird.size);
  } else {
    ctx.fillStyle = '#ffe4b5';
    ctx.beginPath();
    ctx.arc(0, 0, bird.size / 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#000';
    ctx.beginPath();
    ctx.arc(-6, -4, 3, 0, Math.PI * 2);
    ctx.arc(6, -4, 3, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(5, -4); ctx.lineTo(9, -6);
    ctx.stroke();
    ctx.fillStyle = '#ff9999';
    ctx.beginPath();
    ctx.arc(-10, 4, 4, 0, Math.PI * 2);
    ctx.arc(10, 4, 4, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(0, 3, 5, 0.2, Math.PI - 0.2);
    ctx.stroke();
  }
  ctx.restore();
}

function drawBackground() {
  if (!alive && gameOverBg && gameOverBg.complete) {
    ctx.drawImage(gameOverBg, 0, 0, W, H);
    ctx.fillStyle = 'rgba(15,15,35,0.5)';
    ctx.fillRect(0, 0, W, H);
  } else {
    const grad = ctx.createLinearGradient(0, 0, 0, H);
    grad.addColorStop(0, '#0f0f23');
    grad.addColorStop(1, '#1a1a3e');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);
  }

  ctx.font = `14px serif`;
  ctx.textAlign = 'center';
  for (let h of hearts) {
    ctx.fillStyle = `rgba(255, 77, 158, ${h.alpha})`;
    ctx.fillText(h.text, h.x, h.y);
    h.y -= h.speed;
  }
  hearts = hearts.filter(h => h.y > -20);
  if (frameCount % 45 === 0 && started && alive) spawnHeart();

  ctx.fillStyle = '#ff4d9e33';
  ctx.fillRect(0, H - 3, W, 3);
}

function checkCollision(p) {
  const bx = bird.x, by = bird.y;
  const bs = bird.size - 12;
  if (by < 0 || by + bird.size > H) return true;
  if (bx + bs > p.x && bx < p.x + PIPE_W) {
    if (by < p.gapY || by + bs > p.gapY + PIPE_GAP) return true;
  }
  return false;
}

function gameOver() {
  alive = false;
  gameOverBg = preloadedImages[Math.floor(Math.random() * preloadedImages.length)];
  
  canvas.style.transform = 'translate(5px, -5px)';
setTimeout(() => canvas.style.transform = '', 100);

  const elapsed = ((Date.now() - startTime) / 1000).toFixed(1);
  const deathMsg = deathTexts[Math.floor(Math.random() * deathTexts.length)];
  msgEl.innerHTML = `
    ${deathMsg}<br>
    <span style="font-size:20px; color:#ffb6c1;">
      Score: ${score}<br>
      Ignored my cuteness for ${elapsed}s 😏<br>
      <span style="font-size:14px; color:#aaa;">tap to try again, babe</span>
    </span>
  `;
  playCrash();
}

function update() {
  if (!started || !alive) return;
  frameCount++;

  bird.vy += GRAVITY;
  bird.vy = Math.min(bird.vy, MAX_FALL_SPEED);
  bird.y += bird.vy;

  if (frameCount % SPAWN_RATE === 0) spawnPipe();

  for (let i = pipes.length - 1; i >= 0; i--) {
    pipes[i].x -= PIPE_SPEED;
    if (checkCollision(pipes[i])) { gameOver(); return; }

    if (!pipes[i].scored && pipes[i].x + PIPE_W < bird.x) {
      pipes[i].scored = true;
      score++;
      scoreEl.textContent = `Score: ${score} ${score > 4 ? "(I'm obsessed but I won't admit it 💅)" : "(still ignoring me 🙄)"}`;
      if (score % 5 === 0) {
        msgEl.textContent = funnyTexts[Math.floor(Math.random() * funnyTexts.length)];
        setTimeout(() => { if (alive) msgEl.textContent = ''; }, 1000);
      }
      playScore();
    }

    if (pipes[i].x + PIPE_W < -10) pipes.splice(i, 1);
  }
}

function draw() {
  drawBackground();
  if (alive) {
    for (const p of pipes) drawPipe(p);
    drawBird();
  }
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

reset();
loop();
</script>

</body>
</html>
